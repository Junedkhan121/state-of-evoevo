name: EvoEvo Snapshot

on:
  schedule:
    - cron: '0 * * * *'

  workflow_dispatch:

jobs:
  snapshot:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requirements
        run: |
          pip install -r requirements.txt

      - name: Run Main Snapshot
        run: |
          python snapshot.py

      - name: Run Trending Snapshot
        run: |
          python snapshot_trending.py

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add history.csv
          git add trending_agents.csv

          git commit -m "Auto snapshot update" || exit 0

          git push
